<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${titulo} + ' - Sistema Carpintería'">Cotización</title>
  <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>

<div th:replace="~{layout/nav :: nav('ventas')}"></div>

<div class="layout">

  <div class="page-header">
    <div class="page-header-info">
      <h2 th:text="${titulo}">Cotización</h2>
      <span class="cu-tag">CU-02 — Generar cotización del producto</span>
    </div>
    <div class="page-header-actions">
      <a th:href="@{/cotizaciones}" class="btn btn-secondary">← Volver</a>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3 th:text="${titulo}">Cotización</h3>
      <p>El total se calcula automáticamente (Materiales + Mano de Obra)</p>
    </div>

    <form th:action="@{/cotizaciones/guardar}" th:object="${cotizacion}" method="post">
      <input type="hidden" th:field="*{id}">

      <div class="card-body">
        <div class="form-grid">

          <div class="field full-width">
            <label>Solicitud del Cliente <span class="req">*</span></label>
            <select name="solicitudId" class="form-control"
                    th:value="${cotizacion.solicitud != null ? cotizacion.solicitud.id : ''}">
              <option value="">-- Seleccione una solicitud --</option>
              <option th:each="s : ${solicitudes}"
                      th:value="${s.id}"
                      th:text="${'#' + s.id + ' — ' + s.nombreCliente + ' (' + s.tipoProducto + ')'}"
                      th:selected="${cotizacion.solicitud != null and cotizacion.solicitud.id == s.id}">
              </option>
            </select>
          </div>

          <div class="field">
            <label>Precio Materiales (Bs.) <span class="req">*</span></label>
            <input type="number" step="0.01" min="0"
                   th:field="*{precioMateriales}"
                   th:classappend="${#fields.hasErrors('precioMateriales')} ? 'input-error'"
                   placeholder="0.00" class="form-control" id="inpMateriales"
                   oninput="calcularTotal()">
            <span class="field-error" th:if="${#fields.hasErrors('precioMateriales')}"
                  th:errors="*{precioMateriales}"></span>
          </div>

          <div class="field">
            <label>Precio Mano de Obra (Bs.) <span class="req">*</span></label>
            <input type="number" step="0.01" min="0"
                   th:field="*{precioManoObra}"
                   th:classappend="${#fields.hasErrors('precioManoObra')} ? 'input-error'"
                   placeholder="0.00" class="form-control" id="inpManoObra"
                   oninput="calcularTotal()">
            <span class="field-error" th:if="${#fields.hasErrors('precioManoObra')}"
                  th:errors="*{precioManoObra}"></span>
          </div>

          <div class="field full-width">
            <label>Total Estimado (Bs.)</label>
            <div class="total-box" id="totalDisplay">Bs. 0.00</div>
          </div>

          <div class="field full-width">
            <label>Observaciones</label>
            <textarea th:field="*{observaciones}"
                      placeholder="Notas adicionales sobre la cotización..."
                      class="form-control"></textarea>
          </div>

          <div class="field">
            <label>Fecha de Cotización</label>
            <input type="date" th:field="*{fechaCotizacion}" class="form-control">
          </div>

          <div class="field">
            <label>Válida Hasta <span class="req">*</span></label>
            <input type="date" th:field="*{validaHasta}"
                   th:classappend="${#fields.hasErrors('validaHasta')} ? 'input-error'"
                   class="form-control">
            <span class="field-error" th:if="${#fields.hasErrors('validaHasta')}"
                  th:errors="*{validaHasta}"></span>
          </div>

          <div class="field">
            <label>Estado</label>
            <select th:field="*{estado}" class="form-control">
              <option value="PENDIENTE">Pendiente</option>
              <option value="ENVIADA">Enviada</option>
              <option value="ACEPTADA">Aceptada</option>
              <option value="RECHAZADA">Rechazada</option>
            </select>
          </div>

        </div>
      </div>

      <div class="card-footer">
        <button type="submit" class="btn btn-primary">Guardar Cotización</button>
        <a th:href="@{/cotizaciones}" class="btn btn-secondary">Cancelar</a>
      </div>

    </form>
  </div>

</div>

<script>
  function calcularTotal() {
    const mat = parseFloat(document.getElementById('inpMateriales').value) || 0;
    const mano = parseFloat(document.getElementById('inpManoObra').value) || 0;
    document.getElementById('totalDisplay').textContent = 'Bs. ' + (mat + mano).toFixed(2);
  }
  calcularTotal();
</script>

</body>
</html>
