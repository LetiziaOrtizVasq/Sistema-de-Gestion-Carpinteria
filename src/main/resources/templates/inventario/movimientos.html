<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimientos - Sistema Carpintería</title>
  <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>

<div th:replace="~{layout/nav :: nav('inventario')}"></div>

<div class="layout">

  <div class="page-header">
    <div class="page-header-info">
      <h2>Historial de Movimientos</h2>
      <span class="cu-tag">CU-22 — Consultar historial de movimientos de madera</span>
    </div>
    <div class="page-header-actions">
      <a th:href="@{/inventario/ingreso}" class="btn btn-success btn-sm">📥 Ingreso</a>
      <a th:href="@{/inventario/consumo}" class="btn btn-warning btn-sm">🪚 Consumo</a>
      <a th:href="@{/inventario/reposicion}" class="btn btn-info btn-sm">🔄 Reposición</a>
      <a th:href="@{/inventario}" class="btn btn-secondary">← Volver</a>
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <span class="count" th:text="${movimientos.size()} + ' movimiento(s)'"></span>
    </div>

    <div th:if="${movimientos.isEmpty()}" class="empty-state">
      <div class="es-icon">📋</div>
      <div class="es-title">Sin movimientos</div>
      <div class="es-text">Los ingresos, consumos y reposiciones quedan registrados aquí.</div>
    </div>

    <table th:unless="${movimientos.isEmpty()}">
      <thead>
        <tr>
          <th>#</th>
          <th>Tipo</th>
          <th>Madera</th>
          <th>Cantidad</th>
          <th>Proveedor</th>
          <th>Pedido</th>
          <th>Fecha</th>
          <th>Observaciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="m : ${movimientos}">
          <td th:text="${m.id}"></td>
          <td>
            <span class="badge"
                  th:classappend="${m.tipoMovimiento.name() == 'INGRESO'} ? 'badge-exitoso' :
                                 (${m.tipoMovimiento.name() == 'CONSUMO'} ? 'badge-peligro' : 'badge-proceso')"
                  th:text="${m.tipoMovimiento}">
            </span>
          </td>
          <td class="td-bold" th:text="${m.stockMadera.tipoMadera}"></td>
          <td th:text="${#numbers.formatDecimal(m.cantidad, 1, 2)}"></td>
          <td th:text="${m.proveedor != null ? m.proveedor.nombre : '—'}"></td>
          <td th:text="${m.pedido != null ? '#' + m.pedido.id : '—'}"></td>
          <td th:text="${m.fecha}"></td>
          <td th:text="${m.observaciones != null and m.observaciones != '' ? m.observaciones : '—'}"></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
</body>
</html>
