<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Sistema Carpintería</title>
  <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>

<div th:replace="~{layout/nav :: nav('clientes')}"></div>

<div class="layout">

  <div class="page-header">
    <div class="page-header-info">
      <h2>Clientes</h2>
      <span class="cu-tag">CU-04 Registrar · CU-05 Actualizar · CU-07 Historial</span>
    </div>
    <div class="page-header-actions">
      <a th:href="@{/clientes/nuevo}" class="btn btn-primary">＋ Nuevo Cliente</a>
    </div>
  </div>

  <!-- Búsqueda rápida -->
  <div class="card" style="margin-bottom:1.5rem">
    <div class="card-body">
      <form th:action="@{/clientes}" method="get" style="display:flex;gap:1rem;align-items:flex-end">
        <div class="field" style="margin:0;flex:1">
          <label>Buscar por nombre o CI/NIT</label>
          <input type="text" name="buscar" th:value="${buscar}"
                 placeholder="Ej: Juan, 12345678..."
                 class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Buscar</button>
        <a th:href="@{/clientes}" class="btn btn-secondary">Limpiar</a>
      </form>
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <span class="count" th:text="${clientes.size()} + ' cliente(s)'"></span>
    </div>

    <div th:if="${clientes.isEmpty()}" class="empty-state">
      <div class="es-icon">👤</div>
      <div class="es-title">Sin clientes</div>
      <div class="es-text">Registrá el primer cliente con el botón de arriba.</div>
    </div>

    <table th:unless="${clientes.isEmpty()}">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>CI</th>
          <th>Teléfono</th>
          <th>Email</th>
          <th>Dirección</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="c : ${clientes}">
          <td th:text="${c.id}"></td>
          <td class="td-bold" th:text="${c.nombreCompleto}"></td>
          <td th:text="${c.ci != null and c.ci != '' ? c.ci : '—'}"></td>
          <td th:text="${c.telefono}"></td>
          <td th:text="${c.email != null and c.email != '' ? c.email : '—'}"></td>
          <td th:text="${c.direccion != null and c.direccion != '' ? c.direccion : '—'}"></td>
          <td class="td-actions">
            <a th:href="@{/clientes/{id}/historial(id=${c.id})}" class="btn btn-warning btn-xs">Historial</a>
            <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn btn-secondary btn-xs">Editar</a>
            <form th:action="@{/clientes/{id}(id=${c.id})}" method="post" style="display:inline" onsubmit="return confirm('¿Eliminar este cliente?')">
              <input type="hidden" name="_method" value="DELETE">
              <button type="submit" class="btn btn-danger btn-xs">Eliminar</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
</body>
</html>
