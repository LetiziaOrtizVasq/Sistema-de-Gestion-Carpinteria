<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos Finales - Sistema Carpintería</title>
  <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
<div th:replace="~{layout/nav :: nav('entrega')}"></div>
<div class="layout">
  <div class="page-header">
    <div class="page-header-info">
      <h2>Pagos Finales</h2>
      <span class="cu-tag">CU-19 — Registrar pago final del 50% restante</span>
    </div>
    <div class="page-header-actions">
      <a th:href="@{/pagos-final/nuevo}" class="btn btn-primary">＋ Registrar Pago Final</a>
    </div>
  </div>
  <div class="table-card">
    <div class="table-toolbar">
      <span class="count" th:text="${pagos.size()} + ' pago(s)'"></span>
    </div>
    <div th:if="${pagos.isEmpty()}" class="empty-state">
      <div class="es-icon">💳</div>
      <div class="es-title">Sin pagos finales</div>
      <div class="es-text">Registrá el 50% restante después de la entrega del producto.</div>
    </div>
    <table th:unless="${pagos.isEmpty()}">
      <thead>
        <tr>
          <th>#</th><th>Cliente</th><th>Producto</th><th>50% Restante</th>
          <th>Monto Pagado</th><th>Método</th><th>Estado</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${pagos}">
          <td th:text="${p.id}"></td>
          <td class="td-bold" th:text="${p.pedido.cotizacion.solicitud.nombreCliente}"></td>
          <td th:text="${p.pedido.cotizacion.solicitud.resumenProductos}"></td>
          <td th:text="'Bs. ' + ${#numbers.formatDecimal(p.montoRequerido, 1, 2)}"></td>
          <td class="td-total" th:text="'Bs. ' + ${#numbers.formatDecimal(p.montoPagado, 1, 2)}"></td>
          <td th:text="${p.metodoPago}"></td>
          <td>
            <span class="badge"
                  th:classappend="${p.estado == 'PENDIENTE'} ? 'badge-pendiente' : 'badge-exitoso'"
                  th:text="${p.estado}"></span>
          </td>
          <td class="td-actions">
            <form th:action="@{/pagos-final/{id}(id=${p.id})}" method="post" style="display:inline" onsubmit="return ¿Eliminar?('¿Eliminar?')">
              <input type="hidden" name="_method" value="DELETE">
              <button type="submit" class="btn btn-danger btn-xs">Eliminar</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
